<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smriti's Digital Clock</title>
    
    <!-- 1. CSS Section (Styling and Design) -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2e0854, #120224);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: background 1s ease; /* Animation for smooth background transition */
        }

        .clock-container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            padding: 3rem 2rem;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
        }

        #greeting {
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 1rem;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ff9a9e, #fecfef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #time {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            font-family: monospace; /* Keeps numbers aligned perfectly */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        #date {
            font-size: 1.1rem;
            color: #b3b3b3;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- 2. HTML Section (Structure of the Website) -->
    <div class="clock-container">
        <h2 id="greeting">Welcome!</h2>
        <div id="time">00:00:00 PM</div>
        <div id="date">Loading Date...</div>
    </div>

    <!-- 3. JavaScript Section (Logic and Functionality) -->
    <script>
        function updateClock() {
            const now = new Date();
            
            // Extracting time components
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            
            // Converting to 12-hour format
            hours = hours % 12;
            hours = hours ? hours : 12; 
            
            // Adding leading zero if number is less than 10
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            
            // Displaying time on screen
            document.getElementById('time').innerText = ${hours}:${minutes}:${seconds} ${ampm};
            
            // Extracting and displaying full date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', options);
            
            // Dynamic background and greeting based on the time of day
            const currentHour = now.getHours();
            const body = document.body;
            const greetElement = document.getElementById('greeting');
            
            if (currentHour < 12) {
                greetElement.innerText = "Good Morning, Smriti!";
                body.style.background = "linear-gradient(135deg, #ff7e5f, #feb47b)"; // Morning layout
            } else if (currentHour < 16) {
                greetElement.innerText = "Good Afternoon, Smriti!";
                body.style.background = "linear-gradient(135deg, #1c92d2, #f2fcfe)"; // Afternoon layout
            } else if (currentHour < 20) {
                greetElement.innerText = "Good Evening, Smriti!";
                body.style.background = "linear-gradient(135deg, #6441a5, #2a0845)"; // Evening layout
            } else {
                greetElement.innerText = "Good Night, Smriti!";
                body.style.background = "linear-gradient(135deg, #0f2027, #203a43, #2c5364)"; // Night layout
            }
        }

        // Updating the clock every 1 second (1000 milliseconds)
        setInterval(updateClock, 1000);
        
        // Initial call to prevent 1-second delay on page load
        updateClock();
    </script>
</body>
</html>
